<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy International Women's Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #fff5f7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .title {
            font-size: 2.5em;
            color: #d4a5d4;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 1px;
            animation: fadeIn 1s ease-in;
        }

        .message {
            font-size: 1.1em;
            color: #666;
            line-height: 1.8;
            margin-bottom: 40px;
            font-weight: 300;
            animation: slideUp 1s ease-out 0.3s both;
        }

        .photo-container {
            margin: 40px 0;
            animation: slideUp 1s ease-out 0.6s both;
        }

        .photo {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(212, 165, 212, 0.3);
            border: 3px solid #fff;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: #999;
            font-weight: 300;
            animation: fadeIn 1s ease-in 0.9s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .title {
                font-size: 1.8em;
            }

            .message {
                font-size: 1em;
            }

            .photo {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Happy International Women's Day</h1>
        
        <p class="message">
            You are an amazing woman who deserves to be celebrated today and every day. 
            Your strength, beauty, and kindness inspire everyone around you. 
            Thank you for being you. 💝
        </p>

        <div class="photo-container">
            <img src="https://via.placeholder.com/400x400?text=Your+Photo" alt="You" class="photo">
        </div>

        <p class="footer">
            With all my love ✨
        </p>
    </div>
</body>
</html>
